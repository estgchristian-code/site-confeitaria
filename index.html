<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confeitaria Norske - Cardápio</title>
    <link rel="stylesheet" href="style.css">
    <meta name="google-site-verification" content="tj-Pj9nlVmdV6fjmuz3kpzjRxeQj8tBtRoUdzQ4xh70" />
    <link rel="icon" href="imagens/norske.jpg" type="image/jpeg">
</head>
<body>

    <header>
        <h1>Confeitaria Norske</h1>
        <p>Doces e Salgados Artesanais Feitos com Carinho!</p>
    </header>

    <main class="cardapio-container">

        <section class="categoria">
            <h2>Doces e bolos</h2>
            <div class="container-produtos" id="lista-doces"></div>
        </section>

        <section class="categoria">
            <h2>Salgados</h2>
            <div class="container-produtos" id="lista-salgados"></div>
        </section>

        <section class="categoria">
            <h2>Bebidas</h2>
            <div class="container-produtos" id="lista-bebidas"></div>
        </section>

        <section class="categoria">
            <h2>Hambúrgueres</h2>
            <div class="container-produtos" id="lista-hamburgueres"></div>
        </section>

    </main>

    <!-- Botão Fixo do Carrinho (só aparece se tiver itens) -->
    <div id="carrinho-fixo" class="escondido">
        <button id="btn-ver-carrinho" onclick="abrirModalCarrinho()">
            🛒 Ver Pedido (<span id="contador-itens">0</span>)
        </button>
    </div>

    <!-- Modal (Janela flutuante) com o resumo do pedido -->
    <div id="modal-carrinho" class="modal escondido">
        <div class="modal-conteudo">
            <h2>Seu Pedido</h2>
            <div id="itens-carrinho"></div>
            <div class="total-carrinho">
                <strong>Total: </strong><span id="valor-total">R$ 0,00</span>
            </div>
            <div class="modal-botoes">
                <button onclick="fecharModalCarrinho()" class="btn-fechar">Continuar Comprando</button>
                <button onclick="enviarPedidoWhatsApp()" class="btn-enviar-whats">Enviar para o WhatsApp</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Confeitaria Norske - Todos os direitos reservados.</p>
        <p>Imagens criadas com IA</p>
        <p>Horário de atendimento: das 10h às 17h (segunda a sábado).</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
